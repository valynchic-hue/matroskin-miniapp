<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Челленджи с Матроскиным</title>
    
    <!-- VK Bridge для работы с API -->
    <script src="https://vk.com/js/api/openapi.js?169"></script>
    
    <!-- Подключаем стили -->
    <link rel="stylesheet" href="style.css" />
    
    <!-- Манифест -->
    <link rel="manifest" href="manifest.json" />
</head>
<body>
    <!-- Основной контейнер приложения -->
    <div id="root">
        <!-- ШАПКА с кнопкой закрытия -->
        <div class="header">
            <button class="close-btn" id="closeApp">✕</button>
            <h1>
                <span class="emoji-icon">🐄</span> 
                Челленджи с Матроскиным
            </h1>
            <div class="stats-badge">
                🏆 <span id="totalWinsBadge">0</span>
            </div>
        </div>

        <!-- ВКЛАДКИ -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="game">🎮 Игра</button>
            <button class="tab-btn" data-tab="stats">📊 Статистика</button>
            <button class="tab-btn" data-tab="settings">⚙️ Настройки</button>
        </div>

        <!-- СТРАНИЦА: ИГРА -->
        <div class="page active" id="page-game">
            <div class="game-area">
                <!-- Игроки -->
                <div class="players">
                    <div class="player-card">
                        <div class="player-row">
                            <div class="player-name">
                                <span class="emoji">🧑</span> Ты
                            </div>
                            <div class="player-score" id="humanScoreDisplay">0 л</div>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="humanProgress" style="width:0%;">0%</div>
                        </div>
                    </div>

                    <div class="player-card matroskin">
                        <div class="player-row">
                            <div class="player-name">
                                <span class="emoji">🐈</span> Матроскин
                            </div>
                            <div class="player-score" id="matroskinScoreDisplay">0 л</div>
                        </div>
                        <div class="progress-track">
                            <div class="progress-fill" id="matroskinProgress" style="width:0%;">0%</div>
                        </div>
                    </div>
                </div>

                <!-- Управление -->
                <div class="game-controls">
                    <button class="btn-primary" id="milkBtn">
                        🥛 Налить молоко
                    </button>
                    <button class="btn-secondary" id="resetBtn">
                        🔄 Новая игра
                    </button>
                </div>

                <!-- Статус -->
                <div class="status-box" id="statusMessage">
                    <span class="emoji-big">⏳</span> 
                    Нажми «Налить молоко» — и поехали!
                </div>

                <!-- Кнопка поделиться -->
                <button class="btn-share" id="shareBtn">
                    📤 Поделиться результатом
                </button>
            </div>
        </div>

        <!-- СТРАНИЦА: СТАТИСТИКА -->
        <div class="page" id="page-stats">
            <div class="stats-grid">
                <div class="stat-card wins">
                    <div class="number" id="statWins">0</div>
                    <div class="label">🏆 Побед</div>
                </div>
                <div class="stat-card losses">
                    <div class="number" id="statLosses">0</div>
                    <div class="label">😿 Поражений</div>
                </div>
                <div class="stat-card draws">
                    <div class="number" id="statDraws">0</div>
                    <div class="label">🤝 Ничьих</div>
                </div>
                <div class="stat-card total">
                    <div class="number" id="statTotal">0</div>
                    <div class="label">📋 Всего игр</div>
                </div>
            </div>

            <div style="font-weight:600; margin-bottom: 8px; color:#3d2b13;">
                📜 История игр
            </div>
            <div class="history-list" id="historyList">
                <div style="color:#b0987a; text-align:center; padding:20px 0;">
                    Пока нет сыгранных игр 😴
                </div>
            </div>
        </div>

        <!-- СТРАНИЦА: НАСТРОЙКИ -->
        <div class="page" id="page-settings">
            <div class="settings-group">
                <label>🎯 Цель для победы: <span id="winScoreLabel">20</span> л</label>
                <input type="range" id="winScoreSlider" min="10" max="50" value="20" step="5" />
                <div class="range-labels">
                    <span>10 л</span>
                    <span>50 л</span>
                </div>
            </div>

            <div class="settings-group">
                <label>⏱️ Длительность раунда: <span id="gameDurationLabel">30</span> сек</label>
                <input type="range" id="gameDurationSlider" min="15" max="60" value="30" step="5" />
                <div class="range-labels">
                    <span>15 сек</span>
                    <span>60 сек</span>
                </div>
            </div>

            <div class="settings-group">
                <label>🐈 Скорость Матроскина</label>
                <select id="matroskinSpeed">
                    <option value="slow">Медленно (600 мс)</option>
                    <option value="medium" selected>Средне (380 мс)</option>
                    <option value="fast">Быстро (250 мс)</option>
                    <option value="insane">Безумно (150 мс)</option>
                </select>
            </div>

            <button class="btn-danger" id="clearHistoryBtn">🗑️ Очистить историю</button>

            <div style="margin-top:14px; font-size:0.85rem; color:#b0987a; text-align:center;">
                Настройки сохраняются автоматически
            </div>

            <!-- Кнопка для VK Pay (если нужно) -->
            <button class="btn-vkpay" id="vkPayBtn" style="display:none;">
                💳 Поддержать проект
            </button>
        </div>

        <div class="footer">
            🐮 Простоквашино Челленджи v2.0 · 
            <span id="vkVersion">VK Mini App</span>
        </div>
    </div>

    <!-- Подключаем скрипт -->
    <script src="script.js"></script>
</body>
</html>
